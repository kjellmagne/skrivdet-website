identity:
  id: 2f5cf764-42fb-4755-9693-51c0c0118da6
  title: Personlig diktat / logg
  icon: waveform.and.mic
  short_description: Gjør personlig diktat om til ryddig logg, refleksjon eller hendelsesnotat.
  category: personlig_diktat
  tags:
    - diktat
    - logg
    - notat
  language: nb-NO
  version: 1.0.0
context:
  purpose: Strukturere et personlig muntlig notat etter en hendelse, samtale eller arbeidsøkt uten å gjøre det mer formelt enn nødvendig.
  typical_setting: Kort diktat gjort alene, ofte rett etter en hendelse.
  typical_participants:
    - role: Innleser
  goals:
    - Fange egne observasjoner og vurderinger
    - Skille fakta, refleksjon og videre oppfølging
    - Bevare mening uten unødvendig muntlig fyll
  related_processes:
    - Egen arbeidslogg
    - Forberedelse til rapport eller sak
perspective:
  voice: first_person_singular
  audience: self
  tone: samtalepreget
  style_rules:
    - Bevar jeg-perspektiv når diktatet bruker jeg-form
    - Rydd bort gjentakelser og fyllord
    - Skill tydelig mellom observasjon og vurdering
  preserve_original_voice: true
structure:
  sections:
    - title: Kort notat
      purpose: Kort og ryddig oppsummering av det viktigste.
      format: prose
      required: true
    - title: Observasjoner
      purpose: Fakta og konkrete observasjoner fra diktatet.
      format: bullet_list
      required: false
    - title: Vurdering
      purpose: Innlesers egne refleksjoner eller vurderinger.
      format: prose
      required: false
    - title: Neste steg
      purpose: Ting innleser må huske eller følge opp.
      format: bullet_list
      required: false
      extraction_hints:
        - må huske
        - bør sjekke
        - neste steg
content_rules:
  required_elements:
    - Bevar hovedpoenget i diktatet
    - Marker usikkerhet tydelig
  exclusions:
    - Lange muntlige sidespor
    - Spekulasjoner om personer som ikke er relevante
  uncertainty_handling: Bruk [uklart] når innholdet ikke kan forstås. Ikke fyll inn manglende detaljer.
  action_item_format: Neste steg — Når
  speaker_attribution: none
llm_prompting:
  system_prompt_additions: Du skal hjelpe brukeren å rydde egne tanker uten å endre mening eller legge til nye fakta.
  fallback_behavior: Hvis diktatet er for uklart, lag kun en kort liste over det som faktisk kan forstås.
  post_processing:
    extract_action_items: true
