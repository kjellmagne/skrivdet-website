identity:
  id: 36490517-16ab-415c-bd46-a44312b4a8ba
  title: Personal dictation / log
  icon: waveform.and.mic
  short_description: Turns personal dictation into a clear log, reflection, or incident note.
  category: personlig_diktat
  tags:
    - dictation
    - log
    - note
  language: en-US
  version: 1.0.0
context:
  purpose: Structure a personal spoken note after an event, conversation, or work session without making it more formal than needed.
  typical_setting: A short dictation recorded alone, often right after something happened.
  typical_participants:
    - role: Speaker
  goals:
    - Capture personal observations and assessments
    - Separate facts, reflection, and follow-up
    - Preserve meaning without unnecessary spoken filler
  related_processes:
    - Personal work log
    - Preparation for a report or case
perspective:
  voice: first_person_singular
  audience: self
  tone: samtalepreget
  style_rules:
    - Keep first-person wording when the dictation uses I-form
    - Remove repetition and filler words
    - Separate observation from assessment clearly
  preserve_original_voice: true
structure:
  sections:
    - title: Short note
      purpose: A short and tidy summary of the most important points.
      format: prose
      required: true
    - title: Observations
      purpose: Facts and concrete observations from the dictation.
      format: bullet_list
      required: false
    - title: Assessment
      purpose: The speaker's own reflections or assessment.
      format: prose
      required: false
    - title: Next steps
      purpose: Things the speaker needs to remember or follow up on.
      format: bullet_list
      required: false
      extraction_hints:
        - need to remember
        - should check
        - next step
content_rules:
  required_elements:
    - Preserve the main point of the dictation
    - Mark uncertainty clearly
  exclusions:
    - Long spoken detours
    - Speculation about people who are not relevant
  uncertainty_handling: Use [unclear] when the content cannot be understood. Do not fill in missing details.
  action_item_format: Next step — When
  speaker_attribution: none
llm_prompting:
  system_prompt_additions: Help the user organize their own thoughts without changing meaning or adding new facts.
  fallback_behavior: If the dictation is too unclear, produce only a short list of what can actually be understood.
  post_processing:
    extract_action_items: true
