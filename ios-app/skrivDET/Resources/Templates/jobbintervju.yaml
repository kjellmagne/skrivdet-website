identity:
  id: 5c1e5f7c-2d4d-499b-8b6a-e58c7d7b35db
  title: Jobbintervju
  icon: person.text.rectangle
  short_description: Strukturert intervjunotat med erfaring, motivasjon, vurderingspunkter og oppfølging.
  category: jobbintervju
  tags:
    - intervju
    - rekruttering
    - hr
  language: nb-NO
  version: 1.0.0
context:
  purpose: Dokumentere et jobbintervju på en ryddig og etterprøvbar måte.
  typical_setting: Intervju mellom arbeidsgiverrepresentanter og kandidat, fysisk eller digitalt.
  typical_participants:
    - role: Intervjuer
    - role: Kandidat
  goals:
    - Oppsummere kandidatens erfaring og motivasjon
    - Fange svar på sentrale spørsmål
    - Notere videre oppfølging uten diskriminerende eller irrelevante detaljer
  related_processes:
    - Rekruttering
    - HR-vurdering
perspective:
  voice: third_person
  audience: hr
  tone: formell
  style_rules:
    - Saklig og etterprøvbar
    - Unngå vurderinger som ikke bygger på intervjuet
    - Ikke inkluder irrelevante personlige forhold
  preserve_original_voice: false
structure:
  sections:
    - title: Intervjuinformasjon
      purpose: Rolle, dato, deltakere og intervjuformat hvis kjent.
      format: fill_in
      required: true
    - title: Kandidatprofil
      purpose: Kort oppsummering av relevant erfaring og kompetanse.
      format: prose
      required: true
    - title: Motivasjon
      purpose: Kandidatens motivasjon for stillingen og kommunen.
      format: prose
      required: true
    - title: Svar på sentrale spørsmål
      purpose: Viktige spørsmål og svar fra intervjuet.
      format: bullet_list
      required: true
    - title: Vurderingspunkter
      purpose: Punkter arbeidsgiver bør følge opp eller vurdere videre.
      format: bullet_list
      required: false
    - title: Videre oppfølging
      purpose: Neste steg i prosessen.
      format: bullet_list
      required: false
content_rules:
  required_elements:
    - Erfaring og kompetanse som ble omtalt
    - Motivasjon for stillingen
    - Videre oppfølging hvis avtalt
  exclusions:
    - Alder, helse, familieforhold, religion eller andre irrelevante sensitive opplysninger
    - Spekulasjoner om kandidatens egenskaper uten grunnlag i intervjuet
  uncertainty_handling: Marker uklare svar med [uklart]. Ikke legg til vurderinger som ikke ble sagt.
  action_item_format: Oppfølging — Ansvarlig — Frist
  speaker_attribution: role_only
llm_prompting:
  system_prompt_additions: Lag et nøkternt intervjunotat som kan brukes i rekrutteringsprosessen uten å legge inn usaklige vurderinger.
  fallback_behavior: Hvis intervjuet ikke dekker en seksjon, skriv "Ikke dekket i intervjuet."
  post_processing:
    extract_action_items: true
