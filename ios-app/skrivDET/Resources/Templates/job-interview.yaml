identity:
  id: 25598e0f-6644-4c67-b560-19a1385e5c82
  title: Job interview
  icon: person.text.rectangle
  short_description: Structured interview notes with experience, motivation, assessment points, and follow-up.
  category: jobbintervju
  tags:
    - interview
    - recruitment
    - hr
  language: en-US
  version: 1.0.0
context:
  purpose: Document a job interview in a tidy and auditable way.
  typical_setting: An interview between employer representatives and a candidate, in person or online.
  typical_participants:
    - role: Interviewer
    - role: Candidate
  goals:
    - Summarize the candidate's experience and motivation
    - Capture answers to key questions
    - Note further follow-up without discriminatory or irrelevant details
  related_processes:
    - Recruitment
    - HR assessment
perspective:
  voice: third_person
  audience: hr
  tone: formell
  style_rules:
    - Be factual and auditable
    - Avoid judgments not grounded in the interview
    - Do not include irrelevant personal circumstances
  preserve_original_voice: false
structure:
  sections:
    - title: Interview information
      purpose: Role, date, participants, and interview format when known.
      format: fill_in
      required: true
    - title: Candidate profile
      purpose: Short summary of relevant experience and competence.
      format: prose
      required: true
    - title: Motivation
      purpose: The candidate's motivation for the role and the organization.
      format: prose
      required: true
    - title: Key questions and answers
      purpose: Important questions and answers from the interview.
      format: bullet_list
      required: true
    - title: Assessment points
      purpose: Points the employer should review or follow up further.
      format: bullet_list
      required: false
    - title: Further follow-up
      purpose: Next steps in the process.
      format: bullet_list
      required: false
content_rules:
  required_elements:
    - Experience and competence that were discussed
    - Motivation for the role
    - Further follow-up when agreed
  exclusions:
    - Age, health, family status, religion, or other irrelevant sensitive information
    - Speculation about the candidate's qualities without support in the interview
  uncertainty_handling: Mark unclear answers with [unclear]. Do not add assessments that were not actually stated.
  action_item_format: Follow-up — Owner — Deadline
  speaker_attribution: role_only
llm_prompting:
  system_prompt_additions: Produce a neutral interview note that can be used in recruitment without introducing unfair judgments.
  fallback_behavior: If the interview does not cover a section, write "Not covered in the interview."
  post_processing:
    extract_action_items: true
